services:
  app:
    build: .
    env_file: .env
    volumes:
      - ./workspace:/workspace
    stdin_open: true
    tty: true

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file: .env
    volumes:
      - ./workspace:/workspace
      - ./backend:/app/backend
      - ./.env:/app/.env:ro
    ports:
      - "8000:8000"
