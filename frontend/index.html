<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #chat-container {
      width: 100%;
      max-width: 760px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #fff;
      box-shadow: 0 2px 16px rgba(0,0,0,0.1);
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 16px;
      line-height: 1.5;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: #0084ff;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.ai {
      align-self: flex-start;
      background: #f0f2f5;
      color: #1c1e21;
      border-bottom-left-radius: 4px;
    }

    .tool-badge {
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
      align-self: flex-start;
    }

    .thinking {
      align-self: flex-start;
      color: #aaa;
      font-size: 13px;
      font-style: italic;
      padding: 4px 0;
    }

    #input-row {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid #e4e6ea;
      background: #fff;
    }

    #input {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 14px;
      outline: none;
      resize: none;
      line-height: 1.4;
      max-height: 120px;
      overflow-y: auto;
    }

    #input:focus { border-color: #0084ff; }

    #send-btn {
      background: #0084ff;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      align-self: flex-end;
    }

    #send-btn:disabled { background: #ccc; cursor: default; }
  </style>
</head>
<body>
  <div id="chat-container">
    <div id="messages"></div>
    <div id="input-row">
      <textarea id="input" rows="1" placeholder="Type a message…"></textarea>
      <button id="send-btn">&#9658;</button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');

    function appendMessage(role, text) {
      const el = document.createElement('div');
      el.className = `message ${role}`;
      el.textContent = text;
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return el;
    }

    function appendThinking() {
      const el = document.createElement('div');
      el.className = 'thinking';
      el.textContent = 'Thinking…';
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return el;
    }

    function appendToolBadge(tools) {
      if (!tools.length) return;
      const el = document.createElement('div');
      el.className = 'tool-badge';
      el.textContent = 'Used: ' + tools.join(', ');
      messagesEl.appendChild(el);
    }

    async function sendMessage() {
      const content = inputEl.value.trim();
      if (!content) return;

      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;
      inputEl.disabled = true;

      appendMessage('user', content);
      const thinking = appendThinking();

      try {
        const res = await fetch('/api/message', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content }),
        });
        const data = await res.json();
        thinking.remove();
        appendToolBadge(data.tool_calls || []);
        appendMessage('ai', data.content || '(no response)');
      } catch (err) {
        thinking.remove();
        appendMessage('ai', 'Error: ' + err.message);
      } finally {
        sendBtn.disabled = false;
        inputEl.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });
  </script>
</body>
</html>
