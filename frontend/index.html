<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f2f5;
      --container-bg: #fff;
      --sidebar-bg: #e8eaed;
      --shadow: rgba(0,0,0,0.1);
      --msg-ai-bg: #f0f2f5;
      --msg-ai-color: #1c1e21;
      --input-border: #ddd;
      --input-row-border: #e4e6ea;
      --input-row-bg: #fff;
      --input-color: #1c1e21;
      --tool-color: #888;
      --thinking-color: #aaa;
      --toggle-bg: #e4e6ea;
      --toggle-color: #444;
      --chat-item-hover: #d8dade;
      --chat-item-active: #c8ccd4;
    }

    body.dark {
      --bg: #18191a;
      --container-bg: #242526;
      --sidebar-bg: #1c1d1f;
      --shadow: rgba(0,0,0,0.4);
      --msg-ai-bg: #3a3b3c;
      --msg-ai-color: #e4e6eb;
      --input-border: #555;
      --input-row-border: #3a3b3c;
      --input-row-bg: #242526;
      --input-color: #e4e6eb;
      --tool-color: #aaa;
      --thinking-color: #777;
      --toggle-bg: #3a3b3c;
      --toggle-color: #e4e6eb;
      --chat-item-hover: #2a2b2c;
      --chat-item-active: #3a3b3c;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    #app {
      display: flex;
      width: 100%;
      max-width: 980px;
      height: 100vh;
      box-shadow: 0 2px 16px var(--shadow);
    }

    /* ── Sidebar ── */

    #sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--input-row-border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background 0.2s, border-color 0.2s;
    }

    #sidebar-header {
      padding: 10px;
      border-bottom: 1px solid var(--input-row-border);
    }

    #new-chat-btn {
      width: 100%;
      background: var(--toggle-bg);
      color: var(--toggle-color);
      border: none;
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, color 0.15s;
    }

    #new-chat-btn:hover { filter: brightness(0.95); }

    #chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }

    .chat-item {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      cursor: pointer;
      gap: 6px;
      border-radius: 6px;
      margin: 2px 6px;
      transition: background 0.15s;
    }

    .chat-item:hover { background: var(--chat-item-hover); }
    .chat-item.active { background: var(--chat-item-active); }

    .chat-item-text {
      flex: 1;
      min-width: 0;
    }

    .chat-item-title {
      font-size: 13px;
      color: var(--input-color);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-item-date {
      font-size: 11px;
      color: var(--tool-color);
      margin-top: 2px;
    }

    .chat-delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--tool-color);
      font-size: 14px;
      padding: 2px 4px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    .chat-item:hover .chat-delete-btn { opacity: 1; }
    .chat-delete-btn:hover { color: #e04; }

    /* ── Chat area ── */

    #chat-container {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: var(--container-bg);
      transition: background 0.2s;
    }

    #header {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 8px 16px;
      border-bottom: 1px solid var(--input-row-border);
    }

    #dark-toggle, #reset-btn, #clear-workspace-btn {
      background: var(--toggle-bg);
      color: var(--toggle-color);
      border: none;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 16px;
      line-height: 1.5;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: #0084ff;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.ai {
      align-self: flex-start;
      background: var(--msg-ai-bg);
      color: var(--msg-ai-color);
      border-bottom-left-radius: 4px;
    }

    .tool-badge {
      font-size: 11px;
      color: var(--tool-color);
      margin-bottom: 4px;
      align-self: flex-start;
    }

    .thinking {
      align-self: flex-start;
      color: var(--thinking-color);
      font-size: 13px;
      font-style: italic;
      padding: 4px 0;
    }

    #input-row {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid var(--input-row-border);
      background: var(--input-row-bg);
      transition: background 0.2s, border-color 0.2s;
    }

    #input {
      flex: 1;
      border: 1px solid var(--input-border);
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 14px;
      outline: none;
      resize: none;
      line-height: 1.4;
      max-height: 120px;
      overflow-y: auto;
      background: var(--container-bg);
      color: var(--input-color);
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    #input:focus { border-color: #0084ff; }

    #send-btn {
      background: #0084ff;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      align-self: flex-end;
    }

    #send-btn:disabled { background: #ccc; cursor: default; }
  </style>
</head>
<body>
  <div id="app">
    <div id="sidebar">
      <div id="sidebar-header">
        <button id="new-chat-btn">+ New Chat</button>
      </div>
      <div id="chat-list"></div>
    </div>

    <div id="chat-container">
      <div id="header">
        <button id="clear-workspace-btn">📁 Clear workspace</button>
        <button id="reset-btn">🗑 Reset memory</button>
        <button id="dark-toggle">🌙 Dark</button>
      </div>
      <div id="messages"></div>
      <div id="input-row">
        <textarea id="input" rows="1" placeholder="Type a message…"></textarea>
        <button id="send-btn">&#9658;</button>
      </div>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');
    const darkToggle = document.getElementById('dark-toggle');
    const resetBtn = document.getElementById('reset-btn');
    const clearWorkspaceBtn = document.getElementById('clear-workspace-btn');
    const chatListEl = document.getElementById('chat-list');
    const newChatBtn = document.getElementById('new-chat-btn');

    let currentChatId = null;

    // ── Theme ──

    function applyDark(dark) {
      document.body.classList.toggle('dark', dark);
      darkToggle.textContent = dark ? '☀️ Light' : '🌙 Dark';
    }

    const prefersDark = localStorage.getItem('darkMode') === 'true' ||
      (localStorage.getItem('darkMode') === null && window.matchMedia('(prefers-color-scheme: dark)').matches);
    applyDark(prefersDark);

    darkToggle.addEventListener('click', () => {
      const dark = !document.body.classList.contains('dark');
      localStorage.setItem('darkMode', dark);
      applyDark(dark);
    });

    // ── Messages ──

    function appendMessage(role, text) {
      const el = document.createElement('div');
      el.className = `message ${role}`;
      el.textContent = text;
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return el;
    }

    function appendThinking() {
      const el = document.createElement('div');
      el.className = 'thinking';
      el.textContent = 'Thinking…';
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return el;
    }

    function appendToolBadge(tools) {
      if (!tools.length) return;
      const el = document.createElement('div');
      el.className = 'tool-badge';
      el.textContent = 'Used: ' + tools.join(', ');
      messagesEl.appendChild(el);
    }

    async function sendMessage() {
      const content = inputEl.value.trim();
      if (!content) return;

      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;
      inputEl.disabled = true;

      appendMessage('user', content);
      const thinking = appendThinking();

      try {
        const res = await fetch('/api/message', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content }),
        });
        const data = await res.json();
        thinking.remove();
        appendToolBadge(data.tool_calls || []);
        appendMessage('ai', data.content || '(no response)');
        await loadChats();
      } catch (err) {
        thinking.remove();
        appendMessage('ai', 'Error: ' + err.message);
      } finally {
        sendBtn.disabled = false;
        inputEl.disabled = false;
        inputEl.focus();
      }
    }

    // ── Sidebar ──

    function relativeTime(isoStr) {
      const date = new Date(isoStr);
      const diffMs = Date.now() - date.getTime();
      const mins = Math.floor(diffMs / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours}h ago`;
      const days = Math.floor(hours / 24);
      if (days < 7) return `${days}d ago`;
      return date.toLocaleDateString();
    }

    async function loadChats() {
      const res = await fetch('/api/chats');
      const data = await res.json();
      renderChatList(data.chats);
    }

    function renderChatList(chats) {
      chatListEl.innerHTML = '';
      for (const chat of chats) {
        const item = document.createElement('div');
        item.className = 'chat-item' + (chat.id === currentChatId ? ' active' : '');
        item.innerHTML = `
          <div class="chat-item-text">
            <div class="chat-item-title">${escapeHtml(chat.title)}</div>
            <div class="chat-item-date">${relativeTime(chat.updated_at)}</div>
          </div>
          <button class="chat-delete-btn" title="Delete">✕</button>
        `;
        item.addEventListener('click', () => restoreChat(chat.id));
        item.querySelector('.chat-delete-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          deleteChat(chat.id);
        });
        chatListEl.appendChild(item);
      }
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    async function restoreChat(id) {
      const res = await fetch(`/api/chats/${id}/restore`, { method: 'POST' });
      if (!res.ok) return;
      const data = await res.json();
      currentChatId = id;
      messagesEl.innerHTML = '';
      for (const msg of data.messages) {
        appendMessage(msg.role === 'user' ? 'user' : 'ai', msg.content || '');
      }
      messagesEl.scrollTop = messagesEl.scrollHeight;
      loadChats();
      inputEl.focus();
    }

    async function deleteChat(id) {
      if (!confirm('Delete this chat?')) return;
      await fetch(`/api/chats/${id}`, { method: 'DELETE' });
      if (currentChatId === id) {
        currentChatId = null;
        messagesEl.innerHTML = '';
      }
      loadChats();
    }

    newChatBtn.addEventListener('click', async () => {
      await fetch('/api/reset', { method: 'POST' });
      currentChatId = null;
      messagesEl.innerHTML = '';
      loadChats();
      inputEl.focus();
    });

    // ── Controls ──

    clearWorkspaceBtn.addEventListener('click', async () => {
      if (!confirm('Clear all files in workspace/?')) return;
      await fetch('/api/clear-workspace', { method: 'POST' });
    });

    resetBtn.addEventListener('click', async () => {
      if (!confirm('Reset conversation memory?')) return;
      await fetch('/api/reset', { method: 'POST' });
      currentChatId = null;
      messagesEl.innerHTML = '';
      loadChats();
    });

    sendBtn.addEventListener('click', sendMessage);

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    // ── Init ──
    loadChats();
  </script>
</body>
</html>
